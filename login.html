<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dentlab</title>
    <title>Login e Cadastro</title>
    <link rel="stylesheet" href="./css/login.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .cabecalho {
            background-color: #222;
            color: #fff;
            padding: 15px;
        }

        .cabecalho__menu a {
            color: #fff;
            text-decoration: none;
            margin-right: 15px;
        }

        .container-geral {
            display: flex;
            min-height: 80vh;
        }

        .lado-esquerdo, .lado-direito {
            flex: 1;
            padding: 40px;
        }

        .lado-esquerdo img {
            max-width: 100%;
            margin-top: 20px;
        }

        .painel_mockado {
            background-color: #f4f4f4;
            padding: 30px;
            border-radius: 8px;
        }

        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        button.forgot-btn {
            background-color: transparent;
            color: #007bff;
            font-weight: normal;
            margin-top: 5px;
        }

        .error {
            color: red;
            font-size: 0.9em;
        }

        footer {
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 15px 0;
        }

        footer a {
            color: #00aced;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <nav class="cabecalho__menu">
        <a href="#">Home</a>
        <a href="#">Cadastrar-se</a>
    </nav>
</header>

<main class="container-geral">

    <!-- LADO ESQUERDO -->
    <section class="lado-esquerdo">
        <h1>Bem-vindo 👋</h1>
        <p>Entre com seus dados para acessar o sistema ou cadastre-se abaixo.</p>
        <img src="./Imagens/dentist-clinic.svg" alt="Ilustração">
    </section>

    <!-- LADO DIREITO -->
    <section class="lado-direito">
        <div class="painel_mockado">
            <form id="cadastroForm">
                <h2>Cadastro</h2>

                <input type="text" placeholder="Nome" required>
                <input type="email" placeholder="E-mail" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <input type="password" id="confirmaSenha" placeholder="Confirme a senha" required>

                <div class="error" id="errorMessage"></div>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 Minha Empresa | <a href="#">Política de Privacidade</a> | <a href="#">Termos de Uso</a></p>
</footer>

<script>
    const form = document.getElementById('cadastroForm');
    const senha = document.getElementById('senha');
    const confirmaSenha = document.getElementById('confirmaSenha');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', function(event) {
        errorMessage.textContent = '';
        if (senha.value !== confirmaSenha.value) {
            event.preventDefault();
            errorMessage.textContent = 'As senhas não coincidem!';
        }
    });
</script>

</body>
</html>
